services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474" # HTTP Web Interface
      - "7687:7687" # Bolt port for Python driver
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"] # Important utility plugin for graphs
    volumes:
      - ./neo4j_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
